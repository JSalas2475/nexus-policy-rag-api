services:
  - type: web
    name: nexus-policy-rag-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/ingest.py --seed 42 --rebuild
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SEED
        value: "42"
