<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Technologies Policy Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>Nexus Technologies Policy Assistant</h1>
      <p>Ask questions about company policies and procedures.</p>
    </header>

    <main id="chat-container">
      <div id="messages"></div>
    </main>

    <form id="chat-form">
      <textarea id="question" rows="3" placeholder="e.g., How many PTO days do new employees receive?" required></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('chat-form');
    const questionInput = document.getElementById('question');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(role, content, citations = [], latencyMs = null) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      wrapper.appendChild(bubble);

      if (citations.length > 0) {
        const citeBox = document.createElement('div');
        citeBox.className = 'citations';
        citations.forEach(c => {
          const badge = document.createElement('span');
          badge.className = 'citation-badge';
          badge.title = c.snippet;
          badge.textContent = `${c.doc_id}: ${c.section}`;
          citeBox.appendChild(badge);
        });
        wrapper.appendChild(citeBox);
      }

      if (latencyMs !== null) {
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `Response time: ${latencyMs} ms`;
        wrapper.appendChild(meta);
      }

      messages.appendChild(wrapper);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = questionInput.value.trim();
      if (!question) return;

      appendMessage('user', question);
      questionInput.value = '';
      sendBtn.disabled = true;
      sendBtn.textContent = 'Thinking...';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        if (!res.ok) {
          appendMessage('assistant', data.error || 'Something went wrong.');
        } else {
          appendMessage('assistant', data.answer, data.citations || [], data.latency_ms);
        }
      } catch (err) {
        appendMessage('assistant', 'Network error. Please try again.');
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
      }
    });
  </script>
</body>
</html>
